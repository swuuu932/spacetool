<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 단면 시뮬레이터 (Custom Shape)</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --panel: rgba(30, 41, 59, 0.8);
            --text: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
        }

        canvas {
            display: block;
        }

        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            padding: 24px;
            background: var(--panel);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        h1 {
            margin: 0 0 20px 0;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.025em;
        }

        h2 {
            font-size: 0.9rem;
            margin-top: 24px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 4px;
            color: rgba(255, 255, 255, 0.6);
        }

        .control-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            opacity: 0.8;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 24px;
        }

        button {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        button.active {
            background: var(--primary);
            border-color: var(--primary);
            font-weight: 600;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            appearance: none;
            outline: none;
            margin: 8px 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
        }

        .value-display {
            float: right;
            font-family: monospace;
            color: var(--primary);
            font-size: 0.8rem;
        }

        #shape-params {
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }

        .help {
            font-size: 0.75rem;
            opacity: 0.6;
            margin-top: 10px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div id="ui-panel">
    <h1>3D Cross-section</h1>
    
    <label>도형 타입 선택</label>
    <div class="btn-group">
        <button onclick="changeShapeType('cube')" id="btn-cube" class="active">정육면체</button>
        <button onclick="changeShapeType('sphere')" id="btn-sphere">구</button>
        <button onclick="changeShapeType('cylinder')" id="btn-cylinder">원기둥</button>
        <button onclick="changeShapeType('cone')" id="btn-cone">원뿔</button>
    </div>

    <h2>커스텀 도형 제어</h2>
    <div id="shape-params">
        <!-- Cube Params -->
        <div id="params-cube">
            <div class="control-group">
                <label>가로(Width) <span id="val-cube-w" class="value-display">2.0</span></label>
                <input type="range" id="cube-w" min="0.1" max="4" step="0.1" value="2">
            </div>
            <div class="control-group">
                <label>세로(Height) <span id="val-cube-h" class="value-display">2.0</span></label>
                <input type="range" id="cube-h" min="0.1" max="4" step="0.1" value="2">
            </div>
            <div class="control-group">
                <label>높이(Depth) <span id="val-cube-d" class="value-display">2.0</span></label>
                <input type="range" id="cube-d" min="0.1" max="4" step="0.1" value="2">
            </div>
        </div>
        
        <!-- Sphere Params -->
        <div id="params-sphere" class="hidden">
            <div class="control-group">
                <label>반지름(Radius) <span id="val-sphere-r" class="value-display">1.2</span></label>
                <input type="range" id="sphere-r" min="0.1" max="2.5" step="0.1" value="1.2">
            </div>
        </div>

        <!-- Cylinder Params -->
        <div id="params-cylinder" class="hidden">
            <div class="control-group">
                <label>상단 반지름 <span id="val-cyl-rt" class="value-display">1.0</span></label>
                <input type="range" id="cyl-rt" min="0.1" max="2" step="0.1" value="1">
            </div>
            <div class="control-group">
                <label>하단 반지름 <span id="val-cyl-rb" class="value-display">1.0</span></label>
                <input type="range" id="cyl-rb" min="0.1" max="2" step="0.1" value="1">
            </div>
            <div class="control-group">
                <label>높이(Height) <span id="val-cyl-h" class="value-display">2.0</span></label>
                <input type="range" id="cyl-h" min="0.1" max="4" step="0.1" value="2">
            </div>
        </div>

        <!-- Cone Params -->
        <div id="params-cone" class="hidden">
            <div class="control-group">
                <label>반지름(Radius) <span id="val-cone-r" class="value-display">1.0</span></label>
                <input type="range" id="cone-r" min="0.1" max="2" step="0.1" value="1">
            </div>
            <div class="control-group">
                <label>높이(Height) <span id="val-cone-h" class="value-display">2.0</span></label>
                <input type="range" id="cone-h" min="0.1" max="4" step="0.1" value="2">
            </div>
        </div>
    </div>

    <h2>평면 위치 및 회전</h2>
    <div class="control-group">
        <label>평면 위치 (D) <span id="val-dist" class="value-display">0.0</span></label>
        <input type="range" id="plane-dist" min="-3" max="3" step="0.01" value="0">
    </div>

    <div class="control-group">
        <label>평면 회전 X <span id="val-rotX" class="value-display">0°</span></label>
        <input type="range" id="plane-rotX" min="0" max="360" step="1" value="0">
    </div>

    <div class="control-group">
        <label>평면 회전 Z <span id="val-rotZ" class="value-display">0°</span></label>
        <input type="range" id="plane-rotZ" min="0" max="360" step="1" value="0">
    </div>

    <div class="help">
        • 마우스 드래그: 회전<br>
        • 마우스 휠: 확대/축소
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- 초기화 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(4, 4, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // --- 조명 ---
    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const pointLight = new THREE.PointLight(0xffffff, 20);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    // --- 상태 ---
    let currentType = 'cube';
    let currentMesh = null;
    let crossSectionMesh = null;
    let planeVisual = null;
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

    // --- 평면 비주얼 ---
    function createPlaneVisual() {
        const geometry = new THREE.PlaneGeometry(8, 8);
        const material = new THREE.MeshPhongMaterial({
            color: 0x3b82f6,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.15,
            depthWrite: false
        });
        planeVisual = new THREE.Mesh(geometry, material);
        scene.add(planeVisual);

        const edges = new THREE.EdgesGeometry(geometry);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x3b82f6, transparent: true, opacity: 0.4 }));
        planeVisual.add(line);
    }

    // --- 도형 업데이트 로직 ---
    function updateShape() {
        if (currentMesh) {
            scene.remove(currentMesh);
            currentMesh.geometry.dispose();
        }

        let geometry;
        if (currentType === 'cube') {
            const w = parseFloat(document.getElementById('cube-w').value);
            const h = parseFloat(document.getElementById('cube-h').value);
            const d = parseFloat(document.getElementById('cube-d').value);
            document.getElementById('val-cube-w').textContent = w.toFixed(1);
            document.getElementById('val-cube-h').textContent = h.toFixed(1);
            document.getElementById('val-cube-d').textContent = d.toFixed(1);
            geometry = new THREE.BoxGeometry(w, h, d);
        } else if (currentType === 'sphere') {
            const r = parseFloat(document.getElementById('sphere-r').value);
            document.getElementById('val-sphere-r').textContent = r.toFixed(1);
            geometry = new THREE.SphereGeometry(r, 32, 32);
        } else if (currentType === 'cylinder') {
            const rt = parseFloat(document.getElementById('cyl-rt').value);
            const rb = parseFloat(document.getElementById('cyl-rb').value);
            const h = parseFloat(document.getElementById('cyl-h').value);
            document.getElementById('val-cyl-rt').textContent = rt.toFixed(1);
            document.getElementById('val-cyl-rb').textContent = rb.toFixed(1);
            document.getElementById('val-cyl-h').textContent = h.toFixed(1);
            geometry = new THREE.CylinderGeometry(rt, rb, h, 32);
        } else if (currentType === 'cone') {
            const r = parseFloat(document.getElementById('cone-r').value);
            const h = parseFloat(document.getElementById('cone-h').value);
            document.getElementById('val-cone-r').textContent = r.toFixed(1);
            document.getElementById('val-cone-h').textContent = h.toFixed(1);
            geometry = new THREE.ConeGeometry(r, h, 32);
        }

        const material = new THREE.MeshPhongMaterial({
            color: 0x64748b,
            transparent: true,
            opacity: 0.3,
            side: THREE.DoubleSide
        });
        
        currentMesh = new THREE.Mesh(geometry, material);
        scene.add(currentMesh);

        const wireframe = new THREE.LineSegments(
            new THREE.EdgesGeometry(geometry),
            new THREE.LineBasicMaterial({ color: 0x94a3b8, transparent: true, opacity: 0.2 })
        );
        currentMesh.add(wireframe);

        updateCrossSection();
    }

    function changeShapeType(type) {
        currentType = type;
        
        // UI 패널 전환
        ['cube', 'sphere', 'cylinder', 'cone'].forEach(t => {
            document.getElementById(`btn-${t}`).classList.toggle('active', t === type);
            document.getElementById(`params-${t}`).classList.toggle('hidden', t !== type);
        });

        updateShape();
    }

    // --- 단면 계산 (기존 로직 유지 및 최적화) ---
    function updateCrossSection() {
        if (!currentMesh) return;
        if (crossSectionMesh) scene.remove(crossSectionMesh);

        const geometry = currentMesh.geometry;
        const positions = geometry.attributes.position;
        const points = [];
        const vA = new THREE.Vector3();
        const vB = new THREE.Vector3();
        const vC = new THREE.Vector3();

        const index = geometry.index;
        const count = index ? index.count : positions.count;

        for (let i = 0; i < count; i += 3) {
            const idx1 = index ? index.getX(i) : i;
            const idx2 = index ? index.getX(i + 1) : i + 1;
            const idx3 = index ? index.getX(i + 2) : i + 2;

            vA.fromBufferAttribute(positions, idx1);
            vB.fromBufferAttribute(positions, idx2);
            vC.fromBufferAttribute(positions, idx3);

            checkEdge(vA, vB, plane, points);
            checkEdge(vB, vC, plane, points);
            checkEdge(vC, vA, plane, points);
        }

        if (points.length < 3) return;

        const uniquePoints = [];
        points.forEach(p => {
            if (!uniquePoints.some(up => up.distanceTo(p) < 0.001)) {
                uniquePoints.push(p);
            }
        });

        if (uniquePoints.length < 3) return;

        const center = new THREE.Vector3();
        uniquePoints.forEach(p => center.add(p));
        center.divideScalar(uniquePoints.length);

        const normal = plane.normal.clone();
        let tangent = new THREE.Vector3(1, 0, 0);
        if (Math.abs(normal.dot(tangent)) > 0.9) tangent.set(0, 1, 0);
        const bitangent = new THREE.Vector3().crossVectors(normal, tangent).normalize();
        tangent.crossVectors(bitangent, normal).normalize();

        uniquePoints.sort((a, b) => {
            const da = a.clone().sub(center);
            const db = b.clone().sub(center);
            return Math.atan2(da.dot(bitangent), da.dot(tangent)) - Math.atan2(db.dot(bitangent), db.dot(tangent));
        });

        const shape = new THREE.Shape(uniquePoints.map(p => {
            return new THREE.Vector2(p.clone().sub(center).dot(tangent), p.clone().sub(center).dot(bitangent));
        }));
        
        const sectionGeom = new THREE.ShapeGeometry(shape);
        crossSectionMesh = new THREE.Mesh(sectionGeom, new THREE.MeshPhongMaterial({
            color: 0x3b82f6,
            side: THREE.DoubleSide,
            emissive: 0x1d4ed8,
            emissiveIntensity: 0.5
        }));
        
        crossSectionMesh.lookAt(normal);
        crossSectionMesh.position.copy(center);
        scene.add(crossSectionMesh);

        const lineGeom = new THREE.BufferGeometry().setFromPoints([...uniquePoints, uniquePoints[0]]);
        crossSectionMesh.add(new THREE.Line(lineGeom, new THREE.LineBasicMaterial({ color: 0xffffff })));
    }

    function checkEdge(v1, v2, plane, points) {
        const line = new THREE.Line3(v1, v2);
        const intersection = new THREE.Vector3();
        if (plane.intersectLine(line, intersection)) points.push(intersection.clone());
    }

    // --- 평면 업데이트 ---
    function updatePlane() {
        const d = parseFloat(document.getElementById('plane-dist').value);
        const rx = THREE.MathUtils.degToRad(parseFloat(document.getElementById('plane-rotX').value));
        const rz = THREE.MathUtils.degToRad(parseFloat(document.getElementById('plane-rotZ').value));

        document.getElementById('val-dist').textContent = d.toFixed(1);
        document.getElementById('val-rotX').textContent = document.getElementById('plane-rotX').value + '°';
        document.getElementById('val-rotZ').textContent = document.getElementById('plane-rotZ').value + '°';

        const normal = new THREE.Vector3(0, 1, 0).applyEuler(new THREE.Euler(rx, 0, rz));
        plane.set(normal, -d);

        if (planeVisual) {
            planeVisual.position.copy(normal.clone().multiplyScalar(d));
            planeVisual.lookAt(planeVisual.position.clone().add(normal));
        }

        updateCrossSection();
    }

    // --- 이벤트 ---
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', () => {
            if (input.id.startsWith('plane')) updatePlane();
            else updateShape();
        });
    });

    window.changeShapeType = changeShapeType;

    // --- 시작 ---
    createPlaneVisual();
    changeShapeType('cube');
    updatePlane();

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

</script>

</body>
</html>
